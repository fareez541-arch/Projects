# P0-003: Fix CommitLimit=41GB ENOMEM under inference load
# overcommit_memory=0 + ratio=50 = 41GB commit cap on 62GB RAM + 8GB swap
# Kernel denies malloc past 41GB even with 57GB free RAM.
# Mode 1: always overcommit (let OOM killer handle real exhaustion)
vm.overcommit_memory = 1

# P3-005: Reduce swappiness (2.2GB swapped with 57GB free)
vm.swappiness = 10
